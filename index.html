<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2D Tower Defense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --accent:#3b82f6;--accent2:#a855f7;--green:#48bb78;--red:#f56565;--orange:#ed8936;--yellow:#fbbf24;
  --bg-dark:#080c12;--panel-dark:#121820;--border-dark:#2a3240;--text-dark:#e8edf2;
  --bg-light:#f0f4f8;--panel-light:#fff;--border-light:#cbd5e0;--text-light:#1a202c;
}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;user-select:none;transition:background 0.3s,color 0.3s;}
body.dark{background:var(--bg-dark);color:var(--text-dark);}
body.light{background:var(--bg-light);color:var(--text-light);}
.glass.dark,.dark .glass{background:linear-gradient(145deg,#121820,#1a2030);border:1px solid var(--border-dark);box-shadow:0 8px 28px rgba(0,0,0,0.5);}
.glass.light,.light .glass{background:linear-gradient(145deg,#fff,#edf2f7);border:1px solid var(--border-light);box-shadow:0 8px 28px rgba(0,0,0,0.08);}
button,select,input{font-family:inherit;}
button{padding:6px 11px;border-radius:7px;cursor:pointer;font-weight:700;font-size:12px;transition:all 0.15s;border:1px solid transparent;touch-action:manipulation;}
.dark button,.dark select{background:#1a2030;color:#c8d0dc;border-color:#2a3240;}
.light button,.light select{background:#edf2f7;color:#2d3748;border-color:#cbd5e0;}
.dark button:hover{background:#222c3c;border-color:#4a6080;}
.light button:hover{background:#e2e8f0;}
button.sel{background:rgba(66,153,225,0.2)!important;color:#3182ce!important;border-color:#3182ce!important;box-shadow:0 0 10px rgba(66,153,225,0.3);}
.toggle.on{background:rgba(72,187,120,0.2)!important;color:#38a169!important;border-color:#38a169!important;}
select{padding:5px 8px;border-radius:7px;font-weight:700;font-size:12px;}
/* Layout */
#top-bar{width:100%;max-width:1700px;padding:8px 14px 5px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;flex-shrink:0;}
#game-title{font-size:20px;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:linear-gradient(90deg,#3b82f6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
#top-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
#layout{display:flex;gap:10px;align-items:flex-start;max-width:1700px;width:100%;padding:0 8px 8px;flex-shrink:0;}
#main{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0;}
/* Sidebar */
#sidebar{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding:10px;border-radius:14px;overflow-y:auto;max-height:calc(100vh - 120px);}
/* Stats bar */
#stats-bar{display:flex;justify-content:space-around;align-items:center;padding:8px 12px;border-radius:12px;gap:8px;flex-wrap:wrap;}
.stat{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;}
.sv{font-size:18px;font-weight:900;}
#hv{color:var(--red);}#gv{color:var(--green);}#wv{color:var(--orange);}#sv{color:var(--accent2);}
/* Controls */
#ctrl-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
/* Canvas */
#canvas-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,0.45);touch-action:none;}
canvas{display:block;width:100%;height:auto;touch-action:none;}
/* Floating config panel */
#cfg-panel{position:absolute;display:none;flex-direction:column;gap:5px;padding:10px;width:210px;border-radius:12px;z-index:60;backdrop-filter:blur(12px);pointer-events:all;}
.dark #cfg-panel{background:rgba(12,18,28,0.97);border:1px solid #2a3240;box-shadow:0 8px 24px rgba(0,0,0,0.7);}
.light #cfg-panel{background:rgba(255,255,255,0.97);border:1px solid #cbd5e0;box-shadow:0 8px 24px rgba(0,0,0,0.15);}
#cfg-title{font-size:12px;font-weight:900;text-transform:uppercase;border-bottom:1px solid rgba(128,128,128,0.2);padding-bottom:4px;margin-bottom:2px;}
#cfg-stats{font-size:11px;display:flex;flex-direction:column;gap:2px;line-height:1.4;}
#pri-sel{padding:4px;border-radius:5px;font-weight:700;font-size:11px;width:100%;margin-top:2px;}
#sell-btn{background:rgba(245,101,101,0.12);color:#e53e3e;border:1px solid rgba(245,101,101,0.35);padding:5px;font-size:11px;border-radius:6px;width:100%;margin-top:3px;cursor:pointer;}
#sell-btn:hover{background:#e53e3e;color:#fff;}
#upg-panel{display:flex;flex-direction:column;gap:4px;margin-top:4px;padding-top:4px;border-top:1px solid rgba(128,128,128,0.2);}
.upg-track{display:flex;flex-direction:column;gap:3px;}
.upg-label{font-size:10px;font-weight:700;opacity:0.8;}
.upg-dots{display:flex;gap:3px;}
.udot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(128,128,128,0.3);}
.udot.done{border-color:#48bb78;background:#48bb78;}
.udot.next{border-color:#ed8936;animation:pdot 1.2s infinite;}
.udot.lock{border-color:rgba(128,128,128,0.2);}
@keyframes pdot{0%,100%{box-shadow:0 0 0 0 rgba(237,137,54,0.5);}50%{box-shadow:0 0 0 4px rgba(237,137,54,0);}}
.ubtn{font-size:10px;padding:4px 5px;border-radius:5px;background:rgba(237,137,54,0.15);color:#ed8936;border:1px solid rgba(237,137,54,0.4);cursor:pointer;text-align:left;width:100%;}
.ubtn:hover:not(:disabled){background:#ed8936;color:#fff;}
.ubtn:disabled{opacity:0.4;cursor:not-allowed;}
/* Overlays */
#go-layer,#vict-layer{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,8,14,0.96);backdrop-filter:blur(14px);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:100;border-radius:14px;}
#go-layer{border:3px solid var(--red);}
#vict-layer{border:3px solid var(--green);}
.go-title{font-size:clamp(32px,6vw,64px);font-weight:900;color:var(--red);text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 30px rgba(245,101,101,0.5);margin-bottom:10px;}
.v-title{font-size:clamp(32px,6vw,64px);font-weight:900;color:var(--green);text-transform:uppercase;letter-spacing:3px;text-shadow:0 0 30px rgba(72,187,120,0.5);margin-bottom:10px;}
.go-stats{font-size:clamp(13px,2.5vw,18px);color:#c8d0dc;margin-bottom:22px;text-align:center;line-height:2;}
.go-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.go-btns button{padding:11px 28px;font-size:clamp(13px,2vw,16px);font-weight:900;text-transform:uppercase;border-radius:9px;}
#btn-restart{background:var(--red);color:#fff;border:none;}
#btn-next{background:var(--green);color:#fff;border:none;}
#btn-menu{background:#555;color:#fff;border:none;}
/* Shop sidebar */
.sec-title{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;border-bottom:2px solid rgba(128,128,128,0.18);padding-bottom:4px;opacity:0.8;}
#shop-sort-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
#shop-sort-row button{font-size:10px;padding:3px 6px;}
#shop-filter{font-size:10px;padding:3px 6px;border-radius:5px;}
#shop-list{display:flex;flex-direction:column;gap:4px;}
.tower-card{display:flex;flex-direction:column;gap:2px;text-align:left;padding:7px 8px;border-radius:8px;width:100%;cursor:pointer;border:1px solid transparent;transition:all 0.15s;position:relative;touch-action:manipulation;}
.dark .tower-card{background:#1a2030;border-color:#2a3240;}
.light .tower-card{background:#edf2f7;border-color:#cbd5e0;}
.tower-card:hover,.tower-card:active{border-color:var(--accent)!important;}
.tower-card.sel{border-color:#3182ce!important;background:rgba(66,153,225,0.12)!important;}
.tower-card.locked-card{opacity:0.5;cursor:not-allowed;}
.lock-badge{position:absolute;top:4px;right:6px;font-size:10px;opacity:0.7;}
.t-name-row{font-size:12px;font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:4px;}
.t-cost{font-size:11px;font-weight:700;}
.t-cost.aff{color:var(--green);}
.t-cost.exp{color:var(--red);}
.t-desc{font-size:9px;opacity:0.65;line-height:1.3;}
.t-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-top:2px;}
.ts-cell{display:flex;flex-direction:column;align-items:center;padding:2px;border-radius:3px;font-size:9px;}
.dark .ts-cell{background:rgba(255,255,255,0.05);}
.light .ts-cell{background:rgba(0,0,0,0.05);}
.ts-lbl{opacity:0.55;font-size:8px;}
/* Audio */
#audio-drop{position:relative;}
#audio-content{display:none;position:absolute;right:0;top:34px;border-radius:10px;padding:10px;min-width:170px;z-index:200;box-shadow:0 10px 25px rgba(0,0,0,0.5);}
.dark #audio-content{background:#1a2030;border:1px solid #2a3240;}
.light #audio-content{background:#fff;border:1px solid #cbd5e0;}
#audio-content label{font-size:10px;font-weight:700;opacity:0.8;display:block;margin-bottom:2px;margin-top:6px;}
#audio-content label:first-child{margin-top:0;}
#audio-content input[type=range]{width:100%;accent-color:var(--accent);}
/* Save panel */
#save-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:14px;padding:18px;z-index:300;width:min(500px,95vw);display:none;box-shadow:0 20px 50px rgba(0,0,0,0.8);max-height:90vh;overflow-y:auto;}
.dark #save-panel{background:#0d1520;border:2px solid #2a3240;}
.light #save-panel{background:#fff;border:2px solid #cbd5e0;}
#save-panel h2{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center;}
.s-slot{display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:7px;border:1px solid #2a3240;margin-bottom:5px;transition:all 0.15s;}
.s-slot:hover{border-color:var(--accent);}
.s-slot.empty{opacity:0.4;border-style:dashed;}
.s-slot-btns{display:flex;gap:4px;flex-shrink:0;}
.s-slot-btns button{padding:3px 7px;font-size:10px;border-radius:5px;}
#save-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:16px;cursor:pointer;opacity:0.6;}
/* Map panel */
#map-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:14px;padding:18px;z-index:300;width:min(720px,97vw);display:none;box-shadow:0 20px 50px rgba(0,0,0,0.8);max-height:92vh;overflow-y:auto;}
.dark #map-panel{background:#0d1520;border:2px solid #2a3240;}
.light #map-panel{background:#fff;border:2px solid #cbd5e0;}
#map-panel h2{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center;}
#map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.map-card{padding:10px;border-radius:9px;border:1px solid #2a3240;cursor:pointer;transition:all 0.15s;text-align:center;}
.map-card.unlocked{opacity:1;}
.map-card.locked-map{opacity:0.38;filter:grayscale(1);cursor:not-allowed;}
.map-card.beaten{border-color:#48bb78;}
.map-card:hover:not(.locked-map){border-color:var(--accent);transform:translateY(-2px);}
.map-card .map-num{font-size:11px;font-weight:700;opacity:0.6;margin-bottom:3px;}
.map-card .map-name{font-size:12px;font-weight:800;line-height:1.2;}
.map-card .map-status{font-size:10px;margin-top:4px;}
#map-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:16px;cursor:pointer;opacity:0.6;}
/* Progress */
#map-prog{height:5px;border-radius:3px;margin-top:3px;overflow:hidden;background:rgba(128,128,128,0.15);}
#map-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.4s;}
/* Wave ready */
#wave-rdy{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px;background:rgba(72,187,120,0.15);color:#48bb78;border:1px solid rgba(72,187,120,0.3);display:none;}
/* Responsive */
@media(max-width:800px){
  #layout{flex-direction:column;padding:0 4px 8px;}
  #sidebar{width:100%;max-height:none;flex-direction:column;}
  #shop-list{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
  #cfg-panel{width:185px;font-size:10px;}
  #stats-bar{gap:5px;padding:6px 8px;}
  .sv{font-size:15px;}
  .stat{font-size:11px;}
  #ctrl-row button{font-size:11px;padding:5px 8px;}
}
@media(max-width:480px){
  #shop-list{grid-template-columns:1fr 1fr;}
  #game-title{font-size:15px;}
  #top-right{gap:4px;}
  button{padding:5px 7px;font-size:11px;}
}
/* Unlock notification */
.unlock-notif{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#a855f7,#3b82f6);color:#fff;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13px;z-index:500;animation:slideIn 0.4s ease,fadeOut 0.5s ease 3s forwards;}
@keyframes slideIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes fadeOut{to{opacity:0;transform:translateX(120%);}}
</style>
</head>
<body class="dark">

<div id="top-bar">
  <div id="game-title">2D Tower Defense</div>
  <div id="top-right">
    <button id="btn-maps">🗺️ Maps</button>
    <button id="btn-saves">💾 Saves</button>
    <div id="audio-drop">
      <button id="audio-btn">🔊</button>
      <div id="audio-content">
        <label>🎵 Music</label><input type="range" id="bgm-vol" min="0" max="100" value="25">
        <label>💥 SFX</label><input type="range" id="sfx-vol" min="0" max="100" value="55">
        <label><input type="checkbox" id="mute-all"> Mute All</label>
      </div>
    </div>
    <select id="theme-sel"><option value="dark">🌙 Dark</option><option value="light">☀️ Light</option></select>
    <select id="gfx-sel"><option value="low">Low</option><option value="medium">Med</option><option value="high">High</option><option value="ultra" selected>Ultra</option></select>
  </div>
</div>

<div id="layout">
  <div id="main">
    <div id="stats-bar" class="glass">
      <div class="stat">❤️ <span id="hv" class="sv">20</span></div>
      <div class="stat">💰 <span id="gv" class="sv">150</span></div>
      <div class="stat">🌊 <span id="wv" class="sv">0</span></div>
      <div class="stat">⭐ <span id="sv" class="sv">0</span></div>
      <div id="ctrl-row">
        <button id="btn-wave">▶ Start Wave</button>
        <button id="btn-auto" class="toggle">Auto: OFF</button>
        <span id="wave-rdy">✅ Ready</span>
        <button id="btn-speed" class="toggle">1×</button>
        <button id="btn-desel">✕ Desel</button>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="gameCanvas" width="1200" height="720"></canvas>
      <div id="cfg-panel">
        <div id="cfg-title">—</div>
        <div id="cfg-stats"></div>
        <label style="font-size:10px;font-weight:700;margin-top:3px;">Priority:</label>
        <select id="pri-sel">
          <option value="first">First</option><option value="closest">Closest</option>
          <option value="last">Last</option><option value="strongest">Strongest</option>
          <option value="weakest">Weakest</option>
        </select>
        <div id="upg-panel"></div>
        <button id="sell-btn">Sell +$<span id="sell-v">0</span></button>
      </div>
      <div id="go-layer">
        <h1 class="go-title">Game Over</h1>
        <div class="go-stats" id="go-stats"></div>
        <div class="go-btns"><button id="btn-restart">Restart</button></div>
      </div>
      <div id="vict-layer">
        <h1 class="v-title">Victory!</h1>
        <div class="go-stats" id="v-stats"></div>
        <div class="go-btns"><button id="btn-next">Next Map ▶</button><button id="btn-menu">Main Menu</button></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:0 2px;">
      <div id="map-prog" style="flex:1;"><div id="map-prog-fill" style="width:0%"></div></div>
      <span id="map-prog-lbl" style="font-size:10px;opacity:0.6;white-space:nowrap;"></span>
    </div>
  </div>

  <div id="sidebar" class="glass">
    <div class="sec-title">🏗️ Towers</div>
    <div id="shop-sort-row">
      <button id="sort-price" class="sel">$ Price</button>
      <button id="sort-dmg">⚔ DMG</button>
      <button id="sort-rng">🎯 Range</button>
      <button id="sort-dps">📊 DPS</button>
      <select id="shop-filter"><option value="all">All</option><option value="unlocked">Unlocked</option></select>
    </div>
    <div id="shop-list"></div>
  </div>
</div>

<!-- Save Panel -->
<div id="save-panel">
  <button id="save-close">✕</button>
  <h2>💾 Save Slots</h2>
  <div id="save-list"></div>
  <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;">
    <button id="btn-save-now" style="background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:13px;">Save Now</button>
    <button id="btn-new-game" style="background:var(--green);color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:13px;">New Game</button>
  </div>
</div>

<!-- Map Panel -->
<div id="map-panel">
  <button id="map-close">✕</button>
  <h2>🗺️ Campaign Maps</h2>
  <div id="map-grid"></div>
</div>

<script>
// ============================================================
// CORE STATE
// ============================================================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let playerHp=20,gold=150,wave=0,score=0;
let waveActive=false,waveInProgress=false;
let selectedTowerType=null,selectedTowerObj=null;
let gameSpeed=1,autoWave=false;
let currentMapIndex=0,currentTheme="dark";
let graphicsPreset="ultra",gameIsOver=false,gameIsVictory=false;

let bannerText="",bannerTimer=0,internalTicker=0;

let shopSortMode="price",shopFilter="all";
let unlockedTowers=new Set(["burst_cannon","cannon","frost","sniper","minigun"]);
let beatMaps=new Set();
let unlockedMaps=new Set([0]);
let lastTap=0;

const towers=[],enemies=[],projectiles=[],particles=[];
const floatingTexts=[],muzzleFlashes=[],lightningVisuals=[];
const environmentDecorations=[],grassTufts=[],pebbles=[];

let audioCtx=null,bgmGainNode=null,sfxGainNode=null;
let bgmVolume=0.25,sfxVolume=0.55,audioMuted=false,audioInitialized=false;

// ============================================================
// MAPS (20 total)
// ============================================================
const MAPS=[
  {name:"Grassy Plains",    short:"Plains",  bg:"#6cb043",roadColor:"#e6cba4",decorColor:"#2f6920",decorType:"tree",  targetWaves:10,startGold:200,startHp:20,unlockReq:null,
   path:[{x:-30,y:220},{x:450,y:220},{x:450,y:550},{x:900,y:550},{x:900,y:300},{x:1230,y:300}]},
  {name:"Verdant Valley",   short:"Valley",  bg:"#529e37",roadColor:"#caa273",decorColor:"#1d5212",decorType:"tree",  targetWaves:14,startGold:200,startHp:20,unlockReq:0,
   path:[{x:220,y:-30},{x:220,y:590},{x:680,y:590},{x:680,y:150},{x:1050,y:150},{x:1050,y:730}]},
  {name:"Ancient Forest",   short:"Forest",  bg:"#3a7a24",roadColor:"#b88c5c",decorColor:"#0d3206",decorType:"pine",  targetWaves:18,startGold:225,startHp:20,unlockReq:1,
   path:[{x:-30,y:380},{x:300,y:380},{x:300,y:120},{x:900,y:120},{x:900,y:600},{x:1230,y:600}]},
  {name:"Desert Dunes",     short:"Dunes",   bg:"#e8c96a",roadColor:"#dfad5b",decorColor:"#b87d33",decorType:"shrub", targetWaves:22,startGold:225,startHp:18,unlockReq:2,
   path:[{x:600,y:-30},{x:600,y:300},{x:150,y:300},{x:150,y:580},{x:900,y:580},{x:900,y:300},{x:1230,y:300}]},
  {name:"Volcanic Ash",     short:"Volcano", bg:"#3a2218",roadColor:"#7a4f30",decorColor:"#8b2500",decorType:"rock",  targetWaves:26,startGold:250,startHp:18,unlockReq:3,
   path:[{x:-30,y:150},{x:980,y:150},{x:980,y:580},{x:220,y:580},{x:220,y:380},{x:700,y:380},{x:1230,y:380}]},

// ============================================================
// AUDIO
// ============================================================
function initAudio(){
  if(audioInitialized)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    bgmGainNode=audioCtx.createGain();sfxGainNode=audioCtx.createGain();
    bgmGainNode.gain.value=audioMuted?0:bgmVolume;
    sfxGainNode.gain.value=audioMuted?0:sfxVolume;
    bgmGainNode.connect(audioCtx.destination);sfxGainNode.connect(audioCtx.destination);
    startBGM();audioInitialized=true;
  }catch(e){}
}
function startBGM(){
  if(!audioCtx)return;
  const notes=[55,65.41,73.42,82.41,87.31,98];let idx=0;
  function n(){
    if(!bgmGainNode)return;
    let o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(bgmGainNode);o.type='triangle';o.frequency.value=notes[idx%notes.length];
    g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0.05,audioCtx.currentTime+0.1);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.1);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+1.2);
    idx++;setTimeout(n,850+Math.random()*400);
  }n();
}
function playSFX(type){
  if(!audioCtx||!sfxGainNode||audioMuted)return;
  try{
    let o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(sfxGainNode);
    let now=audioCtx.currentTime;
    const C={cannon:{t:'sawtooth',f0:140,f1:40,d:0.15,v:0.12},plasma:{t:'triangle',f0:90,f1:20,d:0.4,v:0.2},
      frost:{t:'sine',f0:600,f1:300,d:0.12,v:0.07},sniper:{t:'square',f0:320,f1:90,d:0.2,v:0.06},
      minigun:{t:'sawtooth',f0:220,f1:200,d:0.05,v:0.04},tesla:{t:'sawtooth',f0:400,f1:800,d:0.15,v:0.08},
      railgun:{t:'sawtooth',f0:300,f1:900,d:0.2,v:0.09},laser:{t:'sine',f0:800,f1:700,d:0.05,v:0.04},
      mortar:{t:'triangle',f0:100,f1:30,d:0.3,v:0.15},flamethrower:{t:'sawtooth',f0:180,f1:60,d:0.08,v:0.05},
      poison:{t:'sine',f0:500,f1:200,d:0.12,v:0.05},missile:{t:'sawtooth',f0:250,f1:80,d:0.25,v:0.1},
      nuke:{t:'sawtooth',f0:80,f1:15,d:1.0,v:0.3}};
    let c=C[type]||C.cannon;
    o.type=c.t;o.frequency.setValueAtTime(c.f0,now);o.frequency.exponentialRampToValueAtTime(c.f1,now+c.d);
    g.gain.setValueAtTime(c.v,now);g.gain.exponentialRampToValueAtTime(0.001,now+c.d);
    o.start(now);o.stop(now+c.d);
  }catch(e){}
}

function computeDPS(cfg){
  let fr=cfg.fireRate===1?1:(60/cfg.fireRate);
  return +(cfg.damage*fr).toFixed(1);
}

function buildShop(){
  let list=document.getElementById("shop-list");list.innerHTML="";
  let keys=[...TOWER_KEYS];
  // Filter
  if(shopFilter==="unlocked") keys=keys.filter(k=>unlockedTowers.has(k));
  // Sort
  keys.sort((a,b)=>{
    let A=TOWER_TYPES[a],B=TOWER_TYPES[b];
    if(shopSortMode==="price")return A.cost-B.cost;
    if(shopSortMode==="dmg")return B.damage-A.damage;
    if(shopSortMode==="rng")return B.range-A.range;
    if(shopSortMode==="dps")return computeDPS(B)-computeDPS(A);
    return 0;
  });
  keys.forEach(key=>{
    let cfg=TOWER_TYPES[key];
    let locked=!unlockedTowers.has(key);
    let aff=gold>=cfg.cost;
    let card=document.createElement("div");
    card.className="tower-card"+(key===selectedTowerType?" sel":"")+(locked?" locked-card":"");
    card.setAttribute("data-type",key);
    card.innerHTML=`
      ${locked?`<div class="lock-badge">🔒 Wave ${cfg.unlockWave}</div>`:""}
      <div class="t-name-row">
        <span>${cfg.emoji} ${cfg.name}</span>
        <span class="t-cost ${aff&&!locked?"aff":"exp"}">$${cfg.cost}</span>
      </div>
      <div class="t-desc">${cfg.desc}</div>
      <div class="t-stats">
        <div class="ts-cell"><span class="ts-lbl">RNG</span><span>${cfg.range}</span></div>
        <div class="ts-cell"><span class="ts-lbl">DMG</span><span>${cfg.damage}</span></div>
        <div class="ts-cell"><span class="ts-lbl">DPS</span><span>${computeDPS(cfg)}</span></div>
      </div>`;
    if(!locked){
      card.addEventListener("click",()=>{
        if(gameIsOver||gameIsVictory)return;
        initAudio();
        if(selectedTowerType===key){selectedTowerType=null;card.classList.remove("sel");}
        else{
          document.querySelectorAll(".tower-card").forEach(b=>b.classList.remove("sel"));
          selectedTowerType=key;selectedTowerObj=null;card.classList.add("sel");
        }
        updateUI();
      });
      // Touch support
      card.addEventListener("touchstart",e=>{e.stopPropagation();},{ passive:true });
    }
    list.appendChild(card);
  });
}

// ============================================================
// CANVAS INPUT (Mouse + Touch)
// ============================================================
function getCoords(e){
  let r=canvas.getBoundingClientRect();
  let cx,cy;
  if(e.touches){
    cx=e.touches[0].clientX;cy=e.touches[0].clientY;
  }else{cx=e.clientX;cy=e.clientY;}
  return{x:(cx-r.left)*(canvas.width/r.width),y:(cy-r.top)*(canvas.height/r.height)};
}

canvas.addEventListener("mousemove",e=>{let c=getCoords(e);mouseX=c.x;mouseY=c.y;isMouseOnCanvas=true;});
canvas.addEventListener("mouseleave",()=>{isMouseOnCanvas=false;});

function handleCanvasAction(e){
  if(gameIsOver||gameIsVictory)return;
  e.preventDefault();
  initAudio();
  let c=getCoords(e);
  // Check tower click/tap
  for(let t of towers){
    if(Math.hypot(t.x-c.x,t.y-c.y)<(TOWER_TYPES[t.type].towerSize||20)+6){
      selectedTowerType=null;selectedTowerObj=t;
      document.querySelectorAll(".tower-card").forEach(b=>b.classList.remove("sel"));
      updateUI();return;
    }
  }
  if(selectedTowerType){
    let cfg=TOWER_TYPES[selectedTowerType];
    if(gold<cfg.cost){createFloatText("Not enough gold!",c.x,c.y-20,"#f56565");return;}
    if(isOnPath(c.x,c.y,38)){createFloatText("Can't build on path!",c.x,c.y-20,"#f56565");return;}
    if(isOnDecoration(c.x,c.y)){createFloatText("Blocked by obstacle!",c.x,c.y-20,"#f56565");return;}
    for(let t of towers){
      if(Math.hypot(t.x-c.x,t.y-c.y)<50){createFloatText("Too close to tower!",c.x,c.y-20,"#f56565");return;}
    }
    towers.push({x:c.x,y:c.y,type:selectedTowerType,angle:0,cooldown:0,priority:"first",upgrades:[],recoil:0,id:Math.random()});
    gold-=cfg.cost;createParticles(c.x,c.y,cfg.color,8);updateUI();
  }else{
    selectedTowerObj=null;updateUI();
  }
}

canvas.addEventListener("click",handleCanvasAction);
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  let c=getCoords(e);mouseX=c.x;mouseY=c.y;isMouseOnCanvas=true;
  handleCanvasAction(e);
},{passive:false});
canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  let c=getCoords(e);mouseX=c.x;mouseY=c.y;
},{passive:false});
canvas.addEventListener("touchend",e=>{e.preventDefault();},{passive:false});

// ============================================================
// PATH & DECORATIONS
// ============================================================
function isOnPath(px,py,r){
  let pts=MAPS[currentMapIndex].path;
  for(let i=0;i<pts.length-1;i++){
    if(ptSegDist(px,py,pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y)<(r+22))return true;
  }
  return false;
}
function isOnDecoration(px,py){
  for(let d of environmentDecorations){if(Math.hypot(d.x-px,d.y-py)<d.size+16)return true;}
  return false;
}
function ptSegDist(x,y,x1,y1,x2,y2){
  let A=x-x1,B=y-y1,C=x2-x1,D=y2-y1,dot=A*C+B*D,len=C*C+D*D,p=len?dot/len:-1;
  let xx,yy;
  if(p<0){xx=x1;yy=y1;}else if(p>1){xx=x2;yy=y2;}else{xx=x1+p*C;yy=y1+p*D;}
  return Math.hypot(x-xx,y-yy);
}

// UI UPDATE
// ============================================================
function updateUI(){
  let m=MAPS[currentMapIndex];
  document.getElementById("hv").innerText=playerHp;
  document.getElementById("gv").innerText=gold;
  let tgt=m.targetWaves===Infinity?"∞":m.targetWaves;
  document.getElementById("wv").innerText=`${wave}/${tgt}`;
  document.getElementById("sv").innerText=score;
  document.getElementById("game-title").innerText=m.name+" — 2D Tower Defense";
  // Progress
  if(m.targetWaves!==Infinity){
    let pct=Math.min(100,(wave/m.targetWaves)*100);
    document.getElementById("map-prog-fill").style.width=pct+"%";
    document.getElementById("map-prog-lbl").innerText=`${wave}/${m.targetWaves} waves`;
  }else{
    document.getElementById("map-prog-fill").style.width="100%";
    document.getElementById("map-prog-lbl").innerText="Endless";
  }
  document.getElementById("wave-rdy").style.display=(!waveInProgress&&!gameIsOver&&!gameIsVictory)?"inline-flex":"none";
  // Refresh shop cost colors
  document.querySelectorAll(".tower-card").forEach(btn=>{
    let type=btn.getAttribute("data-type");
    let cfg=TOWER_TYPES[type];
    let costEl=btn.querySelector(".t-cost");
    if(costEl)costEl.className="t-cost "+(gold>=cfg.cost&&unlockedTowers.has(type)?"aff":"exp");
  });
  // Config panel
  let panel=document.getElementById("cfg-panel");
  if(selectedTowerObj){
    let t=selectedTowerObj,cfg=TOWER_TYPES[t.type];
    let dmg=Math.round(cfg.damage*(t.dmgMult||1));
    let rng=Math.round(cfg.range*(t.rangeMult||1));
    let fr=Math.round(cfg.fireRate*(t.rateMult||1));
    let frText=fr===1?"Continuous":(fr/60).toFixed(2)+"s";
    let dps=cfg.fireRate===1?(dmg).toFixed(1):(dmg/(fr/60)).toFixed(1);
    panel.style.display="flex";
    // Smart positioning
    let pw=210,ph=280;
    let px=t.x+30,py=t.y-ph/2;
    let cw=canvas.width,ch=canvas.height;
    if(px+pw>cw-10)px=t.x-pw-10;
    if(px<4)px=4;
    if(py<4)py=4;
    if(py+ph>ch-10)py=ch-ph-10;
    panel.style.left=px+"px";panel.style.top=py+"px";
    document.getElementById("cfg-title").innerText=`${cfg.emoji} ${cfg.name}`;
    document.getElementById("cfg-stats").innerHTML=
      `<div>⚡ Dmg: <b>${dmg}</b> | 📊 DPS: <b>${dps}</b></div><div>🎯 Range: <b>${rng}px</b></div><div>⏱️ Rate: <b>${frText}</b></div>`;
    document.getElementById("pri-sel").value=t.priority||"first";
    let sv=Math.floor(cfg.cost*0.6);
    (t.upgrades||[]).forEach(u=>sv+=Math.floor(u.cost*0.3));
    document.getElementById("sell-v").innerText=sv;
    renderUpgrades(t);
  }else{
    panel.style.display="none";
  }
}

function renderUpgrades(t){
  let cfg=TOWER_TYPES[t.type];
  let panel=document.getElementById("upg-panel");panel.innerHTML="";
  if(!cfg.upgrades)return;
  cfg.upgrades.forEach((track,ti)=>{
    let done=(t.upgrades||[]).filter(u=>u.track===ti).length;
    let div=document.createElement("div");div.className="upg-track";
    let lbl=document.createElement("div");lbl.className="upg-label";
    lbl.innerText=`Path ${ti+1} (${done}/4)`;div.appendChild(lbl);
    let dots=document.createElement("div");dots.className="upg-dots";
    for(let i=0;i<4;i++){
      let d=document.createElement("div");d.className="udot";
      if(i<done)d.classList.add("done");
      else if(i===done)d.classList.add("next");
      else d.classList.add("lock");
      dots.appendChild(d);
    }
    div.appendChild(dots);
    if(done<4){
      let nu=track[done];
      let btn=document.createElement("button");
      btn.className="ubtn";btn.disabled=gold<nu.cost;
      btn.innerText=`${nu.name}: ${nu.desc} ($${nu.cost})`;
      btn.addEventListener("click",()=>{
        if(gold<nu.cost)return;
        gold-=nu.cost;nu.fn(t);
        if(!t.upgrades)t.upgrades=[];
        t.upgrades.push({track:ti,cost:nu.cost,name:nu.name});
        createFloatText(`↑ ${nu.name}!`,t.x,t.y-32,"#ed8936");
        updateUI();
      });
      div.appendChild(btn);
    }else{
      let d=document.createElement("div");d.style.cssText="font-size:10px;color:#48bb78;font-weight:700;";
      d.innerText="✅ Maxed!";div.appendChild(d);
    }
    panel.appendChild(div);
  });
}

// Map panel
document.getElementById("btn-maps").addEventListener("click",()=>{renderMapPanel();document.getElementById("map-panel").style.display="block";});
document.getElementById("map-close").addEventListener("click",()=>{document.getElementById("map-panel").style.display="none";});

function renderMapPanel(){
  let grid=document.getElementById("map-grid");grid.innerHTML="";
  MAPS.forEach((m,i)=>{
    let unlocked=i===0||beatMaps.has(i-1)||(m.unlockReq===null);
    let beaten=beatMaps.has(i);
    let card=document.createElement("div");
    card.className="map-card"+(unlocked?" unlocked":" locked-map")+(beaten?" beaten":"");
    card.innerHTML=`<div class="map-num">Map ${i+1}/${MAPS.length}</div>
      <div class="map-name">${m.name}</div>
      <div class="map-status">${beaten?"✅ Beaten":unlocked?"🔓 Available":"🔒 Locked"}</div>
      ${beaten?`<div style="font-size:10px;opacity:0.6;margin-top:2px;">${m.targetWaves===Infinity?"Endless":""+m.targetWaves+" waves"}</div>`:""}`;
    if(unlocked){
      card.addEventListener("click",()=>{
        currentMapIndex=i;startMap();
        document.getElementById("map-panel").style.display="none";
      });
    }
    grid.appendChild(card);
  });
}

// ============================================================
// DECORATIONS
// ============================================================
function generateDecorations(){
  environmentDecorations.length=0;grassTufts.length=0;pebbles.length=0;
  let m=MAPS[currentMapIndex];
  for(let i=0;i<55;i++){let px=Math.random()*1200,py=Math.random()*720;if(!isOnPath(px,py,20))pebbles.push({x:px,y:py,size:Math.random()*2+0.8});}
  if(m.decorType!=="rock"){
    for(let gx=30;gx<1200;gx+=52){
      for(let gy=30;gy<720;gy+=52){
        let rx=gx+Math.random()*24-12,ry=gy+Math.random()*24-12;
        if(!isOnPath(rx,ry,30)){
          let bl=[];for(let b=0;b<4+Math.floor(Math.random()*3);b++)bl.push({dx:Math.random()*10-5,dy:-(Math.random()*9+5),curve:Math.random()*7-3.5});
          grassTufts.push({x:rx,y:ry,blades:bl});
        }
      }
    }
  }
  for(let i=0;i<65;i++){
    for(let a=0;a<120;a++){
      let rx=Math.random()*(1200-80)+40,ry=Math.random()*(720-80)+40;
      if(!isOnPath(rx,ry,65)&&!towers.some(t=>Math.hypot(t.x-rx,t.y-ry)<50)){
        environmentDecorations.push({x:rx,y:ry,size:Math.random()*13+14,color:m.decorColor,type:m.decorType,seed:Math.random()*100});
        break;
      }
    }
  }
}

// ============================================================
// WAVE SYSTEM
// ============================================================
function triggerNextWave(){
  if(waveInProgress)return;
  wave++;waveInProgress=true;waveActive=true;
  checkUnlocks();
  updateUI();showBanner(`WAVE ${wave} INCOMING!`);
  let baseCount=6+wave*3;
  let hpScale=Math.pow(1.24,wave-1);
  baseSpawnDelay=Math.max(7,48-wave*1.4);
  spawnCooldown=0;waveSpawnQueue=[];
  for(let i=0;i<baseCount;i++){
    let r=Math.random()*100;
    let zt=ZOMBIE_TYPES[0];
    if(wave>=2&&r>62)zt=ZOMBIE_TYPES[1];
    if(wave>=5&&r>78)zt=ZOMBIE_TYPES[2];
    if(wave>=8&&r>88)zt=ZOMBIE_TYPES[3];
    if(wave>=12&&r>86)zt=ZOMBIE_TYPES[4];
    if(wave>=15&&r>83)zt=ZOMBIE_TYPES[5];
    if(wave>=10&&r>91)zt=ZOMBIE_TYPES[6];
    if(wave>=20&&r>95)zt=ZOMBIE_TYPES[7];
    if(wave>=6&&r>70&&r<75)zt=ZOMBIE_TYPES[8];
    if(wave>=10&&r>72&&r<77)zt=ZOMBIE_TYPES[9];
    waveSpawnQueue.push({typeData:zt,hp:Math.floor(25*zt.hpMult*hpScale)});
  }
}

// ============================================================
// RESET / START
// ============================================================
function resetGame(keepMap){
  if(!keepMap)currentMapIndex=0;
  startMap();
}
function startMap(){
  let m=MAPS[currentMapIndex];
  playerHp=m.startHp;gold=m.startGold;wave=0;score=0;
  selectedTowerObj=null;selectedTowerType=null;
  document.querySelectorAll(".tower-card").forEach(b=>b.classList.remove("sel"));
  resetArrays(true);
  generateDecorations();buildShop();updateUI();
}

// ============================================================
// HELPERS
// ============================================================
function showBanner(txt){bannerText=txt;bannerTimer=100;}
function createFloatText(txt,x,y,color="#fff"){floatingTexts.push({text:txt,x,y,color,life:55});}
function createParticles(x,y,color,n=12,scl=1){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,s=(Math.random()*4+1)*scl;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,size:(Math.random()*4+1.5)*scl,color,life:Math.random()*22+14});
  }
}
function createMuzzle(x,y,ang,type){
  let cfg=TOWER_TYPES[type];
  muzzleFlashes.push({x,y,angle:ang,size:cfg.barrelW*2.2,color:cfg.muzzleColor||"#ffaa00",life:5,maxLife:5});
}
function getOracleMult(tx,ty){
  let mult=1;
  towers.forEach(o=>{
    if(!TOWER_TYPES[o.type].isOracle)return;
    let rng=TOWER_TYPES.oracle.range*(o.rangeMult||1);
    if(o.globalAura||Math.hypot(o.x-tx,o.y-ty)<=rng){
      let m=o.auraMult||1.3;if(o.godEye)m*=3;mult*=m;
    }
  });
  return mult;
}
function getOracleRate(tx,ty){
  let mult=1;
  towers.forEach(o=>{
    if(!TOWER_TYPES[o.type].isOracle||!o.auraRate)return;
    let rng=TOWER_TYPES.oracle.range*(o.rangeMult||1);
    if(o.globalAura||Math.hypot(o.x-tx,o.y-ty)<=rng)mult*=0.75;
  });
  return mult;
}
function getGoldMineBonus(ex,ey,reward){
  let bonus=0;
  towers.forEach(o=>{
    if(!TOWER_TYPES[o.type].isGoldMine||!o.goldAura)return;
    let rng=TOWER_TYPES.gold_mine.range*(o.rangeMult||1);
    if(o.goldAuraGlobal||Math.hypot(o.x-ex,o.y-ey)<=rng)bonus+=o.goldAura;
  });
  towers.forEach(o=>{
    if(!TOWER_TYPES[o.type].isOracle||!o.goldAura)return;
    let rng=TOWER_TYPES.oracle.range*(o.rangeMult||1);
    if(o.goldAuraGlobal||o.goldAuraGlobal||Math.hypot(o.x-ex,o.y-ey)<=rng)bonus+=o.goldAura;
  });
  return bonus;
}

// ============================================================
// GAME LOGIC
// ============================================================
function updateLogic(){
  if(bannerTimer>0)bannerTimer--;
  internalTicker++;

  // Spawn
  if(waveInProgress&&waveSpawnQueue.length>0){
    spawnCooldown--;
    if(spawnCooldown<=0){
      spawnCooldown=baseSpawnDelay;
      let nz=waveSpawnQueue.shift();
      let sp=MAPS[currentMapIndex].path[0];
      enemies.push({x:sp.x,y:sp.y,hp:nz.hp,maxHp:nz.hp,
        speed:nz.typeData.speed,color:nz.typeData.color,reward:nz.typeData.reward,
        size:nz.typeData.size,type:nz.typeData.type,phase:nz.typeData.phase||false,
        armor:nz.typeData.armor||0,pathIdx:0,dist:0,
        slowTimer:0,slowMult:1,burnTimer:0,burnDmg:0,poisonTimer:0,poisonDmg:0,
        stunTimer:0,id:Math.random()});
    }
  }

  // Move enemies
  let pts=MAPS[currentMapIndex].path;
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    if(e.stunTimer>0){e.stunTimer--;continue;}
    if(e.slowTimer>0){e.slowTimer--;e.slowMult=e._slowPow||0.5;}else e.slowMult=1;
    if(e.burnTimer>0){e.burnTimer--;e.hp-=e.burnDmg/60;}
    if(e.poisonTimer>0){e.poisonTimer--;e.hp-=e.poisonDmg/60;}
    if(e.hp<=0){killEnemy(i,e);continue;}
    let spd=e.speed*e.slowMult;
    let tgt=pts[e.pathIdx+1];
    if(!tgt){playerHp--;createFloatText("−1 HP ❤️",e.x,e.y,"#f56565");enemies.splice(i,1);updateUI();if(playerHp<=0)checkGameOver();continue;}
    let dx=tgt.x-e.x,dy=tgt.y-e.y,d=Math.hypot(dx,dy);
    if(d<=spd){e.x=tgt.x;e.y=tgt.y;e.pathIdx++;}
    else{e.x+=dx/d*spd;e.y+=dy/d*spd;}
    e.dist+=spd;
  }

  // Barrier/TimeWarp
  towers.forEach(t=>{
    let cfg=TOWER_TYPES[t.type];
    if(!cfg.isBarrier&&!cfg.isGoldMine)return;
    if(cfg.isGoldMine)return; // gold mine handled on kill
    let rng=cfg.range*(t.rangeMult||1);
    let slow=t.barrierSlow||0.55;
    enemies.forEach(e=>{
      if(Math.hypot(e.x-t.x,e.y-t.y)<=rng){
        e.slowTimer=5;e._slowPow=slow;
        if(t.barrierDmg)e.hp-=t.barrierDmg/60;
        if(t.barrierKill)e.hp=0;
        if(t.timeStop){e.stunTimer=5;}
        if(t.barrierStun&&internalTicker%t.barrierStun===0)e.stunTimer=60;
        if(t.timeRewind){e.x-=0.3;} // minor pushback
      }
    });
  });

  // Towers fire
  towers.forEach(t=>{
    let cfg=TOWER_TYPES[t.type];
    if(cfg.isBarrier||cfg.isOracle||cfg.isGoldMine)return;
    if(t.cooldown>0)t.cooldown--;
    if(t.recoil>0)t.recoil-=0.3;
    let rng=cfg.range*(t.rangeMult||1);
    let om=getOracleMult(t.x,t.y);
    let or2=getOracleRate(t.x,t.y);
    let minDist=(cfg.isMortar||cfg.isMultiMortar)?100:0;
    let vt=enemies.filter(e=>{let d=Math.hypot(e.x-t.x,e.y-t.y);return d<=rng&&d>=minDist;});
    if(!vt.length)return;
    if(t.priority==="first")vt.sort((a,b)=>b.dist-a.dist);
    else if(t.priority==="last")vt.sort((a,b)=>a.dist-b.dist);
    else if(t.priority==="closest")vt.sort((a,b)=>Math.hypot(a.x-t.x,a.y-t.y)-Math.hypot(b.x-t.x,b.y-t.y));
    else if(t.priority==="strongest")vt.sort((a,b)=>b.hp-a.hp);
    else if(t.priority==="weakest")vt.sort((a,b)=>a.hp-b.hp);
    let tgt=vt[0];
    t.angle=Math.atan2(tgt.y-t.y,tgt.x-t.x);
    let efr=Math.round((cfg.fireRate*(t.rateMult||1))*or2);
    let dmgBase=(cfg.damage*(t.dmgMult||1))*om;
    // Multi-mortar burst handling
    if(cfg.isMultiMortar){
      if(t.cooldown>0)return;
      t.cooldown=efr;t.recoil=8;
      createMuzzle(t.x+Math.cos(t.angle)*cfg.barrelLen,t.y+Math.sin(t.angle)*cfg.barrelLen,t.angle,t.type);
      playSFX("mortar");
      let shots=t.multiShot||1;
      for(let s=0;s<shots;s++){
        let tx2=tgt.x+(s*50*(Math.random()-0.5)),ty2=tgt.y+(s*50*(Math.random()-0.5));
        projectiles.push({x:t.x,y:t.y,tx:tx2,ty:ty2,target:tgt,speed:2.5,damage:dmgBase,type:t.type,
          isAoE:true,splashR:(cfg.splashR||130)*(t.splashMult||1),life:0,
          burn:t.burn,empSlow:t.empSlow,stunDur:t.stunDur});
      }
      return;
    }
    // Laser continuous
    if(cfg.isLaser){
      let dmg=dmgBase;
      tgt.hp-=dmg;
      if(t.laserBounce){let prev=tgt;for(let b=0;b<(t.laserBounce||0);b++){let cl=enemies.filter(e=>e!==prev&&Math.hypot(e.x-prev.x,e.y-prev.y)<130);if(!cl.length)break;cl.sort((a,b2)=>Math.hypot(a.x-prev.x,a.y-prev.y)-Math.hypot(b2.x-prev.x,b2.y-prev.y));cl[0].hp-=dmg*0.65;prev=cl[0];}}
      if(t.burn){tgt.burnTimer=120;tgt.burnDmg=t.burn;}
      if(t.armorShred)tgt.armor=Math.max(0,(tgt.armor||0)-t.armorShred);
      if(internalTicker%15===0)playSFX("laser");
      if(tgt.hp<=0)killEnemy(enemies.indexOf(tgt),tgt);
      return;
    }
    // Flame continuous
    if(cfg.isFlame){
      vt.slice(0,t.flameCone?6:1).forEach(e=>{
        let dmg=dmgBase;e.hp-=dmg;
        if(t.burn){e.burnTimer=180;e.burnDmg=t.burn;}
        if(e.hp<=0)killEnemy(enemies.indexOf(e),e);
      });
      if(internalTicker%8===0)playSFX("flamethrower");
      if(graphicsPreset!=="low"){
        let bx=t.x+Math.cos(t.angle)*cfg.barrelLen,by=t.y+Math.sin(t.angle)*cfg.barrelLen;
        particles.push({x:bx,y:by,vx:Math.cos(t.angle)*3.5+Math.random()*2-1,vy:Math.sin(t.angle)*3.5+Math.random()*2-1,size:Math.random()*14+7,color:`hsl(${Math.random()*30+10},100%,55%)`,life:13});
      }
      return;
    }
    // Poison
    if(cfg.isPoison){
      if(t.cooldown>0)return;
      t.cooldown=efr;t.recoil=6;
      let targets=t.poisonAoE?enemies.filter(e=>Math.hypot(e.x-t.x,e.y-t.y)<=rng):[tgt];
      targets.forEach(e=>{
        let dmg=Math.max(0,(cfg.damage*(t.dmgMult||1))-e.armor)*om;e.hp-=dmg;
        let pd=7*(t.poisonMult||1);e.poisonTimer=300;e.poisonDmg=pd;
        if(t.infectSpread)enemies.forEach(ne=>{if(Math.hypot(ne.x-e.x,ne.y-e.y)<=t.infectSpread){ne.poisonTimer=240;ne.poisonDmg=pd*0.5;}});
        if(t.globalPoison)enemies.forEach(ne=>{ne.poisonTimer=240;ne.poisonDmg=pd;});
        if(e.hp<=0)killEnemy(enemies.indexOf(e),e);
      });
      createMuzzle(t.x+Math.cos(t.angle)*cfg.barrelLen,t.y+Math.sin(t.angle)*cfg.barrelLen,t.angle,"poison");
      playSFX("poison");return;
    }
    if(t.cooldown>0)return;
    t.cooldown=efr;t.recoil=8;
    let bx=t.x+Math.cos(t.angle)*cfg.barrelLen,by=t.y+Math.sin(t.angle)*cfg.barrelLen;
    createMuzzle(bx,by,t.angle,t.type);
    playSFX(t.type);
    if(cfg.isTesla){
      fireTesla(t,tgt,dmgBase);
    }else if(cfg.isRailgun){
      fireRailgun(t,dmgBase);
    }else if(cfg.isPlasma||cfg.isMortar||cfg.isShockwave||cfg.isNuke){
      let shots=t.multiShot||1;
      for(let s=0;s<shots;s++){
        let tx2=tgt.x+(s*45*Math.random()),ty2=tgt.y+(s*45*Math.random());
        projectiles.push({x:bx,y:by,tx:tx2,ty:ty2,target:tgt,speed:cfg.isNuke?2.5:5,damage:dmgBase,type:t.type,
          isAoE:true,splashR:(cfg.splashR||100)*(t.splashMult||1),life:0,burn:t.burn,empSlow:t.empSlow,stunDur:t.stunDur});
      }
    }else{
      let shots=t.multiShot||1;
      for(let s=0;s<shots;s++){
        let tE=vt[Math.min(s,vt.length-1)]||tgt;
        projectiles.push({x:bx,y:by,target:tE,tx:tE.x,ty:tE.y,
          speed:t.type==="sniper"||t.type==="sniper_nest"?18:t.type==="antiair"?14:9,
          damage:dmgBase,type:t.type,isFrost:cfg.isFrost,slowPower:t.slowPower,slowDur:t.slowDuration||75,
          isMissile:cfg.isMissile,splashR:t.splashR||(cfg.isMissile?90:0),
          burn:t.burn,armorPierce:t.armorPierce||0,armorShred:t.armorShred||0,
          headshot:t.headshot,executeThresh:t.executeThresh,stunDur:t.stunDur,life:0});
      }
    }
  });

  // Move projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    let p=projectiles[i];p.life++;
    let tx=p.tx,ty=p.ty;
    if(enemies.includes(p.target)){tx=p.target.x;ty=p.target.y;p.tx=tx;p.ty=ty;}
    let dx=tx-p.x,dy=ty-p.y,d=Math.hypot(dx,dy);
    if(d<=p.speed||p.life>500){
      if(p.isAoE){triggerAoE(p.x,p.y,p.splashR,p.damage,p.type,p.burn,p.empSlow,p.stunDur);}
      else if(enemies.includes(p.target)){
        let e=p.target;
        let dmg=Math.max(0,p.damage-(e.armor-(p.armorPierce||0)));
        if(p.executeThresh&&e.hp/e.maxHp<p.executeThresh)dmg=e.hp+1;
        if(p.headshot&&Math.random()<p.headshot)dmg=e.maxHp;
        e.hp-=dmg;
        if(p.isFrost){e.slowTimer=p.slowDur||75;e._slowPow=p.slowPower||0.5;}
        if(p.burn){e.burnTimer=180;e.burnDmg=p.burn;}
        if(p.armorShred)e.armor=Math.max(0,(e.armor||0)-p.armorShred);
        if(p.stunDur)e.stunTimer=p.stunDur;
        if(p.splashR)enemies.forEach(ne=>{if(ne!==e&&Math.hypot(ne.x-e.x,ne.y-e.y)<=p.splashR)ne.hp-=dmg*0.45;});
        createParticles(e.x,e.y,p.isFrost?"#06b6d4":"#a855f7",5);
        if(e.hp<=0)killEnemy(enemies.indexOf(e),e);
      }
      projectiles.splice(i,1);
    }else{p.x+=dx/d*p.speed;p.y+=dy/d*p.speed;}
  }

  // Particles, texts, flashes
  for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=floatingTexts.length-1;i>=0;i--){let f=floatingTexts[i];f.y-=0.5;f.life--;if(f.life<=0)floatingTexts.splice(i,1);}
  for(let i=muzzleFlashes.length-1;i>=0;i--){muzzleFlashes[i].life--;if(muzzleFlashes[i].life<=0)muzzleFlashes.splice(i,1);}
  for(let i=lightningVisuals.length-1;i>=0;i--){lightningVisuals[i].life--;if(lightningVisuals[i].life<=0)lightningVisuals.splice(i,1);}

  // Wave complete
  if(waveInProgress&&enemies.length===0&&waveSpawnQueue.length===0){
    waveInProgress=false;
    let bonus=150+wave*20;gold+=bonus;score+=bonus;
    createFloatText(`Wave ${wave} Done! +$${bonus}`,canvas.width/2,100,"#48bb78");
    checkUnlocks();
    let m=MAPS[currentMapIndex];
    if(wave>=m.targetWaves&&m.targetWaves!==Infinity){
      beatMaps.add(currentMapIndex);
      unlockedMaps.add(currentMapIndex+1);
      gameIsVictory=true;
      document.getElementById("v-stats").innerHTML=`Map ${currentMapIndex+1} Complete!<br>Wave: <b>${wave}</b> · Score: <b>${score}</b>`;
      document.getElementById("vict-layer").style.display="flex";
    }else if(autoWave){autoStartTimer=55;}
    updateUI();
  }
  if(!waveInProgress&&autoWave&&autoStartTimer>0&&!gameIsOver&&!gameIsVictory){
    autoStartTimer--;if(autoStartTimer<=0)triggerNextWave();
  }
}

function killEnemy(idx,e){
  if(idx<0||idx>=enemies.length)return;
  let bonus=getGoldMineBonus(e.x,e.y,e.reward);
  gold+=e.reward+bonus;score+=e.reward*2;
  if(bonus>0)createFloatText(`+$${e.reward+bonus}💎`,e.x,e.y-14,"#fbbf24");
  else createFloatText(`+$${e.reward}`,e.x,e.y-14,"#48bb78");
  createParticles(e.x,e.y,e.color,10);
  enemies.splice(idx,1);updateUI();
}

function triggerAoE(x,y,r,dmg,type,burn,empSlow,stunDur){
  createParticles(x,y,type==="nuke"?"#ef4444":"#ff4500",40,2.5);
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    if(Math.hypot(e.x-x,e.y-y)<=r){
      e.hp-=dmg;
      if(burn){e.burnTimer=240;e.burnDmg=burn;}
      if(empSlow){e.slowTimer=200;e._slowPow=0.3;}
      if(stunDur)e.stunTimer=stunDur;
      if(e.hp<=0)killEnemy(i,e);
    }
  }
}

function fireTesla(t,firstTarget,dmg){
  let cfg=TOWER_TYPES[t.type];
  let cc=(cfg.chainCount||5)+(t.chainBonus||0);
  if(t.globalChain)cc=enemies.length;
  let cr=t.chainRange||110;
  let list=[firstTarget],cur=firstTarget;
  while(list.length<cc){
    let poss=enemies.filter(e=>!list.includes(e)&&Math.hypot(e.x-cur.x,e.y-cur.y)<=cr);
    if(!poss.length)break;
    poss.sort((a,b)=>Math.hypot(a.x-cur.x,a.y-cur.y)-Math.hypot(b.x-cur.x,b.y-cur.y));
    list.push(poss[0]);cur=poss[0];
  }
  let start={x:t.x+Math.cos(t.angle)*cfg.barrelLen,y:t.y+Math.sin(t.angle)*cfg.barrelLen};
  list.forEach((e,idx)=>{
    e.hp-=dmg*(1-idx*0.07);
    if(t.stunDur)e.stunTimer=t.stunDur;
    if(t.empSlow){e.slowTimer=200;e._slowPow=0.3;}
    if(t.splash)enemies.forEach(ne=>{if(ne!==e&&Math.hypot(ne.x-e.x,ne.y-e.y)<=t.splash)ne.hp-=dmg*0.3;});
    let prev=idx===0?start:list[idx-1];
    let sx=idx===0?start.x:prev.x,sy=idx===0?start.y:prev.y;
    let segs=[],steps=6;
    for(let s=0;s<steps;s++){
      let p1=s/steps,p2=(s+1)/steps;
      let mx=sx+(e.x-sx)*p1,my=sy+(e.y-sy)*p1;
      let mx2=sx+(e.x-sx)*p2,my2=sy+(e.y-sy)*p2;
      let perp=Math.atan2(e.y-sy,e.x-sx)+Math.PI/2;
      let j=(Math.random()-0.5)*28;
      segs.push({x1:mx+Math.cos(perp)*j,y1:my+Math.sin(perp)*j,x2:mx2,y2:my2});
    }
    lightningVisuals.push({segs,life:8,color:t.type==="chain_lightning"?"#bae6fd":"#c084fc",width:Math.max(0.5,2-idx*0.15)});
    if(e.hp<=0)killEnemy(enemies.indexOf(e),e);
  });
}

function fireRailgun(t,dmg){
  let cfg=TOWER_TYPES[t.type];
  let rng=cfg.range*(t.rangeMult||1);
  let rails=t.multiRail||1;
  for(let r=0;r<rails;r++){
    let ang=t.angle+(r-Math.floor(rails/2))*0.1;
    let ex=t.x+Math.cos(ang)*rng,ey=t.y+Math.sin(ang)*rng;
    let bx=t.x+Math.cos(ang)*cfg.barrelLen,by=t.y+Math.sin(ang)*cfg.barrelLen;
    lightningVisuals.push({segs:[{x1:bx,y1:by,x2:ex,y2:ey}],life:10,color:t.type==="beam_cannon"?"#d8b4fe":"#93c5fd",width:t.type==="beam_cannon"?6:4});
    for(let i=enemies.length-1;i>=0;i--){
      let e=enemies[i];
      if(ptSegDist(e.x,e.y,bx,by,ex,ey)<(e.size+8)){
        let d2=Math.max(0,dmg-e.armor+(t.armorPierce||0));
        if(t.executeThresh&&e.hp/e.maxHp<t.executeThresh)d2=e.hp+1;
        e.hp-=d2;
        if(t.splash)enemies.forEach(ne=>{if(ne!==e&&Math.hypot(ne.x-e.x,ne.y-e.y)<=t.splash)ne.hp-=d2*0.35;});
        createParticles(e.x,e.y,"#3b82f6",6);
        if(e.hp<=0)killEnemy(i,e);
      }
    }
  }
}

function checkGameOver(){
  if(playerHp<=0){
    playerHp=0;gameIsOver=true;
    document.getElementById("go-stats").innerHTML=`Waves: <b>${wave}</b> · Score: <b>${score}</b>`;
    document.getElementById("go-layer").style.display="flex";
  }
}

// ============================================================
// DRAWING
// ============================================================
function getTowerVisualColor(t){
  let cfg=TOWER_TYPES[t.type];
  let upgCount=(t.upgrades||[]).length;
  if(upgCount===0)return cfg.baseColor||cfg.color;
  // Shift hue/brightness as tower upgrades
  return cfg.color; // base; glow handles the rest
}

function drawTowerBody(t){
  let cfg=TOWER_TYPES[t.type];
  let sz=cfg.towerSize||18;
  let upgCount=(t.upgrades||[]).length;
  let isSelected=t===selectedTowerObj;
  ctx.save();
  ctx.translate(t.x,t.y);
  // Shadow
  if(graphicsPreset!=="low"){
    ctx.fillStyle="rgba(0,0,0,0.25)";ctx.beginPath();ctx.arc(3,3,sz,0,Math.PI*2);ctx.fill();
  }
  // Upgrade visual enhancement
  let glowIntensity=upgCount*0.15;
  if(upgCount>=6){
    // Outer ring - Maxed upgrade glow
    ctx.strokeStyle=`hsla(${45+upgCount*20},100%,65%,0.9)`;
    ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,sz+5,0,Math.PI*2);ctx.stroke();
    // Spinning outer ring indicator
    ctx.save();ctx.rotate(internalTicker*0.03);
    ctx.strokeStyle=`hsla(${internalTicker*2%360},80%,60%,0.5)`;
    ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(0,0,sz+9,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  } else if(upgCount>=4){
    ctx.strokeStyle=`hsla(${60+upgCount*25},90%,60%,0.7)`;
    ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,sz+4,0,Math.PI*2);ctx.stroke();
  } else if(upgCount>=2){
    ctx.strokeStyle=`hsla(${100+upgCount*30},80%,55%,0.5)`;
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,sz+3,0,Math.PI*2);ctx.stroke();
  }
  // Main body with upgrade gradient
  let grad=ctx.createRadialGradient(-sz*0.3,-sz*0.3,0,0,0,sz);
  let baseC=cfg.baseColor||cfg.color;
  if(upgCount>=6){
    grad.addColorStop(0,"#fff8e1");grad.addColorStop(0.5,baseC);grad.addColorStop(1,"#1a0000");
  }else if(upgCount>=4){
    grad.addColorStop(0,"#fffde4");grad.addColorStop(0.6,baseC);grad.addColorStop(1,"rgba(0,0,0,0.8)");
  }else if(upgCount>=2){
    grad.addColorStop(0,"rgba(255,255,220,0.4)");grad.addColorStop(0.7,baseC);grad.addColorStop(1,"rgba(0,0,0,0.6)");
  }else{
    grad.addColorStop(0,"rgba(255,255,255,0.25)");grad.addColorStop(1,baseC);
  }
  ctx.fillStyle=grad;
  ctx.strokeStyle=isSelected?"#fff":`rgba(255,255,255,${0.2+upgCount*0.06})`;
  ctx.lineWidth=isSelected?3:1.5;
  // Special shapes for unique tower types
  if(cfg.isOracle||cfg.isGoldMine){
    // Hexagonal
    ctx.beginPath();
    for(let k=0;k<6;k++){let a=k*Math.PI/3-Math.PI/6;ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);}
    ctx.closePath();ctx.fill();ctx.stroke();
  }else if(cfg.isNuke||cfg.isEarthquake||t.type==="earthquake"){
    // Octagonal for big towers
    ctx.beginPath();
    for(let k=0;k<8;k++){let a=k*Math.PI/4;ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);}
    ctx.closePath();ctx.fill();ctx.stroke();
  }else if(cfg.isBarrier||cfg.isFrost||t.type==="cryo_cannon"){
    // Square rotated
    ctx.save();ctx.rotate(Math.PI/4+internalTicker*0.01);
    ctx.fillRect(-sz*0.85,-sz*0.85,sz*1.7,sz*1.7);
    ctx.strokeRect(-sz*0.85,-sz*0.85,sz*1.7,sz*1.7);
    ctx.restore();
  }else{
    ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.fill();ctx.stroke();
  }
  // Barrel
  ctx.save();ctx.rotate(t.angle-(cfg.isBarrier||cfg.isGoldMine||cfg.isOracle?Math.PI/4:0));
  let ro=t.recoil||0;
  if(!cfg.isBarrier&&!cfg.isOracle&&!cfg.isGoldMine){
    let bgrad=ctx.createLinearGradient(0,-cfg.barrelW/2,0,cfg.barrelW/2);
    bgrad.addColorStop(0,"rgba(200,200,200,0.9)");bgrad.addColorStop(1,"rgba(80,80,80,0.9)");
    ctx.fillStyle=bgrad;
    ctx.strokeStyle="rgba(0,0,0,0.4)";ctx.lineWidth=1;
    // Multi-barrel for gatling/multi-mortar
    if(t.type==="gatling"||(t.type==="minigun"&&upgCount>=4)){
      for(let b=-1;b<=1;b++){
        ctx.fillRect(-ro,-cfg.barrelW/2+b*(cfg.barrelW*0.55),cfg.barrelLen+6,cfg.barrelW*0.4);
      }
    }else if(t.type==="multi_mortar"){
      ctx.fillRect(-ro,-cfg.barrelW/2,cfg.barrelLen,cfg.barrelW);
      ctx.fillRect(-ro,-cfg.barrelW-4,cfg.barrelLen*0.75,cfg.barrelW*0.7);
      ctx.fillRect(-ro,4,cfg.barrelLen*0.75,cfg.barrelW*0.7);
    }else{
      ctx.fillRect(-ro,-cfg.barrelW/2,cfg.barrelLen,cfg.barrelW);
      ctx.strokeRect(-ro,-cfg.barrelW/2,cfg.barrelLen,cfg.barrelW);
    }
    // Muzzle tip
    ctx.fillStyle=cfg.muzzleColor||"#ffaa00";
    ctx.beginPath();ctx.arc(cfg.barrelLen-ro,0,cfg.barrelW*0.4,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // Icon
  if(graphicsPreset!=="low"){
    ctx.font=`${10+Math.min(upgCount,4)}px Arial`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillStyle="rgba(255,255,255,"+(0.7+upgCount*0.05)+")";
    ctx.fillText(cfg.emoji,0,0);
  }
  ctx.restore();
}

function draw(){
  let m=MAPS[currentMapIndex];
  ctx.fillStyle=m.bg;ctx.fillRect(0,0,canvas.width,canvas.height);

  // Pebbles
  if(graphicsPreset!=="low"){
    ctx.fillStyle="rgba(0,0,0,0.06)";
    pebbles.forEach(p=>{ctx.beginPath();ctx.arc(p.x+1.5,p.y+1.5,p.size,0,Math.PI*2);ctx.fill();});
  }
  ctx.fillStyle=m.roadColor;
  pebbles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});

  // Path
  ctx.lineWidth=44;ctx.strokeStyle=m.roadColor;ctx.lineCap="round";ctx.lineJoin="round";
  ctx.beginPath();
  let pts=m.path;ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
  if(graphicsPreset==="high"||graphicsPreset==="ultra"){
    ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=42;ctx.stroke();
    ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=2;ctx.stroke();
  }

  // Grass tufts
  if(graphicsPreset==="ultra"&&m.decorType!=="rock"){
    ctx.strokeStyle="rgba(0,0,0,0.13)";ctx.lineWidth=1.2;
    grassTufts.forEach(g=>{g.blades.forEach(b=>{ctx.beginPath();ctx.moveTo(g.x,g.y);ctx.quadraticCurveTo(g.x+b.curve,g.y+b.dy/2,g.x+b.dx,g.y+b.dy);ctx.stroke();});});
  }

  // Decorations
  environmentDecorations.forEach(d=>{
    ctx.save();
    if(graphicsPreset!=="low"){ctx.fillStyle="rgba(0,0,0,0.2)";ctx.beginPath();ctx.arc(d.x+d.size*0.22,d.y+d.size*0.22,d.size,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle=d.color;
    if(d.type==="tree"){ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);ctx.fill();}
    else if(d.type==="pine"){
      ctx.beginPath();ctx.moveTo(d.x,d.y-d.size);ctx.lineTo(d.x-d.size*0.8,d.y+d.size*0.8);ctx.lineTo(d.x+d.size*0.8,d.y+d.size*0.8);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(d.x,d.y-d.size*0.5);ctx.lineTo(d.x-d.size*1.1,d.y+d.size*1.1);ctx.lineTo(d.x+d.size*1.1,d.y+d.size*1.1);ctx.closePath();ctx.fill();
    }
    else{ctx.beginPath();ctx.arc(d.x,d.y,d.size*0.75,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });

  // Tower range preview (selected type)
  if(selectedTowerType&&isMouseOnCanvas){
    let cfg=TOWER_TYPES[selectedTowerType];
    let blocked=isOnPath(mouseX,mouseY,36)||isOnDecoration(mouseX,mouseY)||towers.some(t=>Math.hypot(t.x-mouseX,t.y-mouseY)<50);
    ctx.save();
    ctx.fillStyle=blocked?"rgba(245,101,101,0.1)":"rgba(66,153,225,0.08)";
    ctx.strokeStyle=blocked?"#f56565":"#3182ce";
    ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.arc(mouseX,mouseY,cfg.range,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha=0.65;
    ctx.fillStyle=blocked?"rgba(245,101,101,0.7)":cfg.color;
    ctx.strokeStyle="#fff";ctx.lineWidth=1.5;
    let tsz=cfg.towerSize||18;
    ctx.beginPath();ctx.arc(mouseX,mouseY,tsz,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.globalAlpha=1;
    ctx.font="bold 12px Arial";ctx.textAlign="center";
    ctx.fillStyle=blocked?"#f56565":"#fff";
    ctx.fillText(blocked?"✕ Blocked":cfg.emoji+" "+cfg.name,mouseX,mouseY-tsz-8);
    ctx.restore();
  }

  // Selected tower range
  if(selectedTowerObj){
    let cfg=TOWER_TYPES[selectedTowerObj.type];
    let rng=cfg.range*(selectedTowerObj.rangeMult||1);
    ctx.save();ctx.fillStyle="rgba(107,70,193,0.05)";ctx.strokeStyle="#805ad5";ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.arc(selectedTowerObj.x,selectedTowerObj.y,rng,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();
  }

  // Draw all towers
  towers.forEach(t=>drawTowerBody(t));

  // Laser beams
  towers.forEach(t=>{
    if(!TOWER_TYPES[t.type].isLaser)return;
    let cfg=TOWER_TYPES[t.type];
    let rng=cfg.range*(t.rangeMult||1);
    let vt=enemies.filter(e=>Math.hypot(e.x-t.x,e.y-t.y)<=rng);
    if(!vt.length)return;
    vt.sort((a,b)=>b.dist-a.dist);let tgt=vt[0];
    ctx.save();
    let alpha=0.7+Math.sin(internalTicker*0.4)*0.3;
    let lw=(t.laserWidth||2)*(1+(t.dmgMult||1)*0.1);
    ctx.strokeStyle=`rgba(239,68,68,${alpha})`;ctx.lineWidth=Math.min(lw,6);
    ctx.shadowColor="#ef4444";ctx.shadowBlur=14;
    ctx.beginPath();ctx.moveTo(t.x+Math.cos(t.angle)*cfg.barrelLen,t.y+Math.sin(t.angle)*cfg.barrelLen);
    ctx.lineTo(tgt.x,tgt.y);ctx.stroke();
    ctx.restore();
  });

  // Lightning visuals
  lightningVisuals.forEach(lv=>{
    ctx.save();ctx.strokeStyle=lv.color;ctx.lineWidth=Math.max(0.5,lv.width*(lv.life/9));
    ctx.shadowColor=lv.color;ctx.shadowBlur=10;
    lv.segs.forEach(s=>{ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();});
    ctx.restore();
  });

  // Projectiles
  projectiles.forEach(p=>{
    ctx.save();
    let col=p.isFrost?"#22d3ee":p.type==="plasma"||p.type==="mortar"||p.type==="multi_mortar"?"#f97316":p.type==="nuke"?"#ef4444":p.type==="missile"?"#6366f1":p.type==="poison_rain"?"#a3e635":"#e2e8f0";
    let sz=p.type==="plasma"||p.type==="nuke"?11:p.type==="mortar"||p.type==="multi_mortar"?8:p.type==="missile"?7:5;
    if(graphicsPreset!=="low"){ctx.shadowColor=col;ctx.shadowBlur=8;}
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Muzzle flashes
  muzzleFlashes.forEach(f=>{
    ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.angle);
    ctx.fillStyle=f.color;ctx.globalAlpha=f.life/f.maxLife;
    if(graphicsPreset!=="low"){ctx.shadowColor=f.color;ctx.shadowBlur=12;}
    ctx.beginPath();ctx.moveTo(0,-f.size/2);ctx.lineTo(f.size,0);ctx.lineTo(0,f.size/2);ctx.closePath();ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e=>{
    ctx.save();
    let bob=Math.sin(internalTicker*0.18*e.speed)*2.2;
    let sway=Math.cos(internalTicker*0.12*e.speed)*0.08;
    ctx.translate(e.x,e.y+bob);ctx.rotate(sway);
    if(graphicsPreset!=="low"){ctx.fillStyle="rgba(0,0,0,0.22)";ctx.beginPath();ctx.arc(2,2,e.size,0,Math.PI*2);ctx.fill();}
    if(e.phase){ctx.globalAlpha=0.5+Math.sin(internalTicker*0.14)*0.25;}
    // Gradient body
    let eg=ctx.createRadialGradient(-e.size*0.3,-e.size*0.3,0,0,0,e.size);
    eg.addColorStop(0,"rgba(255,255,255,0.4)");eg.addColorStop(0.5,e.color);eg.addColorStop(1,"rgba(0,0,0,0.7)");
    ctx.fillStyle=eg;
    ctx.beginPath();ctx.arc(0,0,e.size,0,Math.PI*2);ctx.fill();
    if(e.armor>0){ctx.strokeStyle="rgba(200,200,220,0.7)";ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,e.size+1.5,0,Math.PI*2);ctx.stroke();}
    if(e.slowTimer>0){ctx.fillStyle="rgba(6,182,212,0.3)";ctx.beginPath();ctx.arc(0,0,e.size+2,0,Math.PI*2);ctx.fill();}
    if(e.burnTimer>0){ctx.fillStyle="rgba(255,100,0,0.35)";ctx.beginPath();ctx.arc(0,0,e.size+1.5,0,Math.PI*2);ctx.fill();}
    if(e.poisonTimer>0){ctx.fillStyle="rgba(132,204,22,0.35)";ctx.beginPath();ctx.arc(0,0,e.size+1.5,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;ctx.restore();
    // HP bar with percentage
    if(e.hp<e.maxHp||e.type==="megaboss"||e.type==="boss"){
      let bw=Math.max(e.size*2.4,28),bh=5;
      let pct=Math.max(0,e.hp/e.maxHp);
      ctx.fillStyle="rgba(0,0,0,0.55)";ctx.fillRect(e.x-bw/2,e.y-e.size-14,bw,bh);
      ctx.fillStyle=pct>0.6?"#48bb78":pct>0.3?"#ed8936":"#f56565";
      ctx.fillRect(e.x-bw/2,e.y-e.size-14,bw*pct,bh);
      // HP percentage text
      ctx.fillStyle="#fff";ctx.font="bold 8px Arial";ctx.textAlign="center";
      ctx.fillText(`${Math.ceil(pct*100)}%`,e.x,e.y-e.size-16);
    }
  });

  // Particles
  particles.forEach(pt=>{
    ctx.save();ctx.fillStyle=pt.color;ctx.globalAlpha=Math.max(0,pt.life/24);
    if(graphicsPreset==="ultra"){ctx.shadowColor=pt.color;ctx.shadowBlur=4;}
    ctx.fillRect(pt.x,pt.y,pt.size,pt.size);ctx.restore();
  });

  // Floating texts
  floatingTexts.forEach(ft=>{
    ctx.save();ctx.fillStyle=ft.color;ctx.globalAlpha=Math.max(0,ft.life/55);
    ctx.font="bold 13px 'Segoe UI',Arial";ctx.textAlign="center";
    ctx.fillText(ft.text,ft.x,ft.y);ctx.restore();
  });

  // Wave banner
  if(bannerTimer>0){
    let a=Math.min(1,bannerTimer/20);
    ctx.save();ctx.fillStyle=`rgba(0,0,0,${a*0.8})`;ctx.fillRect(0,canvas.height/2-44,canvas.width,88);
    ctx.font="bold 36px 'Segoe UI',Arial";ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(bannerText,canvas.width/2,canvas.height/2);ctx.restore();
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastFrameTime=0;
function masterLoop(ts){
  if(!gameIsOver&&!gameIsVictory){
    for(let s=0;s<gameSpeed;s++){updateLogic();if(playerHp<=0){checkGameOver();break;}}
  }
  draw();requestAnimationFrame(masterLoop);
}

// INIT
// ============================================================
window.addEventListener("click",initAudio,{once:true});
window.addEventListener("touchstart",initAudio,{once:true});
applyTheme("dark");
generateDecorations();
buildShop();
updateUI();
requestAnimationFrame(masterLoop);
